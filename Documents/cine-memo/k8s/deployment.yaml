apiVersion: apps/v1
kind: Deployment
metadata:
  name: cine-memo
  namespace: cine-memo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cine-memo
  template:
    metadata:
      labels:
        app: cine-memo
    spec:
      containers:
        - name: cine-memo
          image: ghcr.io/sylvaiinn/cine-memo:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cinememo-secrets
                  key: DATABASE_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: cinememo-secrets
                  key: NEXTAUTH_SECRET
            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: cinememo-secrets
                  key: NEXTAUTH_URL
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cinememo-secrets
                  key: TMDB_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cinememo-secrets
                  key: GROQ_API_KEY
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
