name: Build & Deploy Ciné-Mémo

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sylvaiinn/cine-memo:latest
            ghcr.io/sylvaiinn/cine-memo:${{ github.sha }}

      - name: Deploy to K3s
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

          kubectl set image deployment/cine-memo \
            cine-memo=ghcr.io/sylvaiinn/cine-memo:${{ github.sha }} \
            -n cine-memo

          kubectl rollout status deployment/cine-memo \
            -n cine-memo \
            --timeout=120s
